server:
  port: 8080

spring:
  application:
    name: ai-vision-voice-assistant-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/ai_vision_voice_assistant?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 10MB

management:
  endpoints:
    web:
      exposure:
        include: health,info

assistant:
  cors:
    allowed-origins: ${ASSISTANT_CORS_ALLOWED_ORIGINS:http://localhost:5173}
  auth:
    jwt-secret: ${ASSISTANT_AUTH_JWT_SECRET:change-me-at-least-32-bytes-secret-for-dev-only}
    jwt-issuer: ${ASSISTANT_AUTH_JWT_ISSUER:ai-vision-voice-assistant}
    access-token-minutes: ${ASSISTANT_AUTH_ACCESS_TOKEN_MINUTES:30}
    refresh-token-days: ${ASSISTANT_AUTH_REFRESH_TOKEN_DAYS:14}
  model:
    provider: ${ASSISTANT_MODEL_PROVIDER:mock}
    base-url: ${ASSISTANT_MODEL_BASE_URL:https://api.openai.com/v1}
    api-key: ${ASSISTANT_MODEL_API_KEY:}
    model-name: ${ASSISTANT_MODEL_MODEL_NAME:gpt-4o-mini}
    timeout-ms: ${ASSISTANT_MODEL_TIMEOUT_MS:15000}
  dialogue:
    # calm-natural: 像普通视频通话一样回答。视觉只是上下文，不强行描述画面。
    style: ${ASSISTANT_DIALOGUE_STYLE:calm-natural}
    max-sentences: ${ASSISTANT_DIALOGUE_MAX_SENTENCES:2}
    allow-follow-up-question: ${ASSISTANT_DIALOGUE_ALLOW_FOLLOW_UP_QUESTION:false}
    temperature: ${ASSISTANT_DIALOGUE_TEMPERATURE:0.25}

  billing:
    token-unit-price-yuan: ${ASSISTANT_BILLING_TOKEN_UNIT_PRICE_YUAN:0.00001}
    input-token-multiplier: ${ASSISTANT_BILLING_INPUT_TOKEN_MULTIPLIER:1}
    output-token-multiplier: ${ASSISTANT_BILLING_OUTPUT_TOKEN_MULTIPLIER:4}
    min-visual-charge-tokens: ${ASSISTANT_BILLING_MIN_VISUAL_CHARGE_TOKENS:5000}
    min-start-balance-tokens: ${ASSISTANT_BILLING_MIN_START_BALANCE_TOKENS:5000}
    max-demo-recharge-tokens: ${ASSISTANT_BILLING_MAX_DEMO_RECHARGE_TOKENS:1000000}
    provider-input-price-per-million-yuan: ${ASSISTANT_BILLING_PROVIDER_INPUT_PRICE_PER_MILLION_YUAN:0.15}
    provider-output-price-per-million-yuan: ${ASSISTANT_BILLING_PROVIDER_OUTPUT_PRICE_PER_MILLION_YUAN:0.60}
  cost:
    max-image-bytes: ${ASSISTANT_COST_MAX_IMAGE_BYTES:524288}
    max-frame-count: ${ASSISTANT_COST_MAX_FRAME_COUNT:15}
    max-total-image-bytes: ${ASSISTANT_COST_MAX_TOTAL_IMAGE_BYTES:3145728}
    max-question-length: ${ASSISTANT_COST_MAX_QUESTION_LENGTH:500}
    max-output-tokens: ${ASSISTANT_COST_MAX_OUTPUT_TOKENS:500}
    min-session-interval-ms: ${ASSISTANT_COST_MIN_SESSION_INTERVAL_MS:10000}
    max-session-requests-per-day: ${ASSISTANT_COST_MAX_SESSION_REQUESTS_PER_DAY:30}
    max-ip-requests-per-day: ${ASSISTANT_COST_MAX_IP_REQUESTS_PER_DAY:100}
    cache-ttl-seconds: ${ASSISTANT_COST_CACHE_TTL_SECONDS:600}
    history-rounds: ${ASSISTANT_COST_HISTORY_ROUNDS:3}
